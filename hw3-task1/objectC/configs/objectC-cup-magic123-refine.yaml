name: "objectC-cup-magic123-refine"
tag: "${rmspace:${basename:${data.image_path}},_}-${rmspace:${system.prompt_processor.prompt},_}"
exp_root_dir: "/root/autodl-tmp/outputs"
seed: 0

data_type: "single-image-datamodule"
data:
  image_path: /root/autodl-tmp/work/threestudio/load/images/cup_rgba.png
  height: 512
  width: 512
  default_elevation_deg: 0.0
  default_azimuth_deg: 0.0
  default_camera_distance: 2.5
  default_fovy_deg: 40.0
  random_camera:
    batch_size: 1
    height: 512
    width: 512
    elevation_range: [-45, 45]
    azimuth_range: [-180, 180]
    camera_distance_range: [2.5, 2.5]
    fovy_range: [40.0, 40.0]
    camera_perturb: 0.0
    center_perturb: 0.0
    up_perturb: 0.0
    eval_height: 512
    eval_width: 512
    eval_elevation_deg: ${data.default_elevation_deg}
    eval_camera_distance: ${data.default_camera_distance}
    eval_fovy_deg: ${data.default_fovy_deg}
    n_val_views: 4
    n_test_views: 120

system_type: "magic123-system"
system:
  refinement: true
  geometry_convert_from: /root/autodl-tmp/outputs/objectC-cup-magic123-coarse/cup_rgba.png-a_pink_insulated_travel_tumbler_with_flip_lid,_side_strap,_printed_text_on_the_body,_product_photo,_smooth_plastic_body@20260611-110711/ckpts/last.ckpt
  geometry_convert_inherit_texture: true
  geometry_type: "tetrahedra-sdf-grid"
  geometry:
    radius: 1.0 # consistent with coarse
    isosurface_resolution: 128
    isosurface_deformable_grid: true
    pos_encoding_config:
      otype: HashGrid
      n_levels: 16
      n_features_per_level: 2
      log2_hashmap_size: 19
      base_resolution: 16
      per_level_scale: 1.447269237440378 # max resolution 4096
    mlp_network_config:
      otype: "VanillaMLP"
      activation: "ReLU"
      output_activation: "none"
      n_neurons: 64
      n_hidden_layers: 2
    fix_geometry: false # optimize grid sdf and deformation

  material_type: "no-material"

  background_type: "solid-color-background"

  renderer_type: "nvdiff-rasterizer"
  renderer:
    context_type: cuda

  guidance_3d_type: "zero123-guidance"
  guidance_3d:
    pretrained_model_name_or_path: "/root/autodl-tmp/work/threestudio/load/zero123/zero123-xl.ckpt"
    pretrained_config: "/root/autodl-tmp/work/threestudio/load/zero123/sd-objaverse-finetune-c_concat-256.yaml"
    vram_O: true
    guidance_scale: 5.5
    min_step_percent: 0.2
    max_step_percent: 0.6

    cond_image_path: ${data.image_path}
    cond_elevation_deg: ${data.default_elevation_deg}
    cond_azimuth_deg: ${data.default_azimuth_deg}
    cond_camera_distance: ${data.default_camera_distance}

  prompt_processor_type: "stable-diffusion-prompt-processor"
  prompt_processor:
    pretrained_model_name_or_path: "/root/autodl-tmp/models/stable-diffusion-v1-5"
    prompt: "a pink insulated travel tumbler with flip lid, side strap, printed text on the body, product photo, smooth plastic body"
    spawn: false
    use_cache: true

  guidance_type: "stable-diffusion-unified-guidance"
  guidance:
    guidance_type: "sds"
    pretrained_model_name_or_path: "/root/autodl-tmp/models/stable-diffusion-v1-5"
    guidance_scale: 80.
    min_step_percent: 0.2
    max_step_percent: 0.6
    use_img_loss: false
    enable_sequential_cpu_offload: true
    enable_attention_slicing: true

  loggers:
    wandb:
      enable: true
      project: "cv-hw3-objectc"
      name: "objectC-cup-magic123-refine"

  loss:
    lambda_rgb: 1000.
    lambda_mask: 100.
    lambda_sd: 0.025
    lambda_3d_sds: 1.
    lambda_sd_img: 0.
    lambda_normal_consistency: 1000.
    lambda_laplacian_smoothness: 0.

  optimizer:
    name: Adam
    args:
      lr: 0.001
      betas: [0.9, 0.99]
      eps: 1.e-8

trainer:
  max_steps: 3000
  log_every_n_steps: 1
  num_sanity_val_steps: 1
  val_check_interval: 100
  enable_progress_bar: true
  precision: 32

checkpoint:
  save_last: true # save at each validation time
  save_top_k: -1
  every_n_train_steps: 500
